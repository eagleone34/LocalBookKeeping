<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="200" cy="315" r="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="1000" cy="315" r="350" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Subtle dot grid -->
  <g opacity="0.08">
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="white"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#dots)"/>
  </g>

  <!-- Top border accent -->
  <rect x="0" y="0" width="1200" height="3" fill="#2563eb"/>

  <!-- Logo area -->
  <g transform="translate(80, 80)">
    <!-- Book icon -->
    <rect x="0" y="0" width="44" height="44" rx="10" fill="#2563eb"/>
    <path d="M22 8v28" stroke="#1e40af" stroke-width="1.5"/>
    <path d="M9 13h8M9 18h8M9 23h6" stroke="#93c5fd" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M27 13h8M27 18h8M27 23h6" stroke="#93c5fd" stroke-width="1.2" stroke-linecap="round"/>
    <circle cx="36" cy="36" r="9" fill="#10b981"/>
    <path d="M32 36l2.5 2.5 4-4" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Brand text -->
    <text x="56" y="30" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="26" font-weight="700" fill="white">LocalBooks</text>
  </g>

  <!-- Main headline -->
  <text x="80" y="220" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="62" font-weight="800" fill="white">Your Books.</text>
  <text x="80" y="295" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="62" font-weight="800" fill="white">Your Computer.</text>

  <!-- Accent line -->
  <rect x="80" y="320" width="80" height="4" rx="2" fill="#2563eb"/>

  <!-- Subheadline -->
  <text x="80" y="370" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="22" fill="#94a3b8">Simple bookkeeping for personal finances</text>
  <text x="80" y="400" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="22" fill="#94a3b8">and small businesses. No cloud. No subscription.</text>

  <!-- Price + Badge row -->
  <g transform="translate(80, 440)">
    <!-- Price badge -->
    <rect x="0" y="0" width="190" height="52" rx="26" fill="#2563eb"/>
    <text x="95" y="34" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="white" text-anchor="middle">$49.99 Once</text>
    <!-- Divider dot -->
    <circle cx="215" cy="26" r="3" fill="#475569"/>
    <!-- Guarantee text -->
    <text x="240" y="33" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="16" fill="#64748b">30-day money-back guarantee</text>
  </g>

  <!-- Right side: abstract financial visual -->
  <g transform="translate(700, 100)">
    <!-- Floating card 1 - Income -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="220" height="90" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <text x="20" y="30" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">Total Income</text>
      <text x="20" y="62" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="#10b981">$4,361,528</text>
      <!-- Trend arrow -->
      <path d="M185 50l10-15 10 5" stroke="#10b981" stroke-width="2" stroke-linecap="round" fill="none"/>
    </g>

    <!-- Floating card 2 - Expenses -->
    <g transform="translate(240, 40)">
      <rect x="0" y="0" width="200" height="90" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <text x="20" y="30" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">Total Expenses</text>
      <text x="20" y="62" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="#ef4444">$595,247</text>
    </g>

    <!-- Floating card 3 - Net -->
    <g transform="translate(60, 130)">
      <rect x="0" y="0" width="240" height="90" rx="12" fill="#1e293b" stroke="#2563eb" stroke-width="1.5"/>
      <text x="20" y="30" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">Net Income</text>
      <text x="20" y="62" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="#3b82f6">$3,766,281</text>
      <!-- Sparkline -->
      <polyline points="170,60 180,45 190,50 200,35 210,40 220,25" stroke="#3b82f6" stroke-width="2" fill="none" stroke-linecap="round"/>
    </g>

    <!-- Mini bar chart -->
    <g transform="translate(0, 270)">
      <rect x="0" y="0" width="200" height="140" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <text x="16" y="28" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Monthly Trend</text>
      <!-- Bars -->
      <rect x="20" y="50" width="16" height="70" rx="3" fill="#10b981" opacity="0.7"/>
      <rect x="42" y="75" width="16" height="45" rx="3" fill="#10b981" opacity="0.7"/>
      <rect x="64" y="55" width="16" height="65" rx="3" fill="#10b981" opacity="0.7"/>
      <rect x="86" y="42" width="16" height="78" rx="3" fill="#10b981" opacity="0.8"/>
      <rect x="108" y="60" width="16" height="60" rx="3" fill="#10b981" opacity="0.7"/>
      <rect x="130" y="48" width="16" height="72" rx="3" fill="#10b981" opacity="0.8"/>
      <rect x="152" y="38" width="16" height="82" rx="3" fill="#2563eb" opacity="0.9"/>
    </g>

    <!-- Mini pie chart -->
    <g transform="translate(230, 270)">
      <rect x="0" y="0" width="200" height="140" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <text x="16" y="28" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Expenses</text>
      <circle cx="100" cy="85" r="40" fill="none" stroke="#3b82f6" stroke-width="14" stroke-dasharray="75 176" stroke-dashoffset="25"/>
      <circle cx="100" cy="85" r="40" fill="none" stroke="#10b981" stroke-width="14" stroke-dasharray="50 201" stroke-dashoffset="-50"/>
      <circle cx="100" cy="85" r="40" fill="none" stroke="#8b5cf6" stroke-width="14" stroke-dasharray="40 211" stroke-dashoffset="-100"/>
      <circle cx="100" cy="85" r="40" fill="none" stroke="#f59e0b" stroke-width="14" stroke-dasharray="35 216" stroke-dashoffset="-140"/>
      <circle cx="100" cy="85" r="40" fill="none" stroke="#ec4899" stroke-width="14" stroke-dasharray="25 226" stroke-dashoffset="-175"/>
      <circle cx="100" cy="85" r="26" fill="#1e293b"/>
    </g>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="620" width="1200" height="10" fill="#2563eb" opacity="0.5"/>

  <!-- URL -->
  <text x="80" y="560" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="16" fill="#475569">llmboost.ca</text>
</svg>
